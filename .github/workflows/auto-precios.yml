name: Auto-actualización de precios (API Comisión Europea)

# ─────────────────────────────────────────────────────────────────────────────
# Descarga precios de porcino de España de la API pública gratuita de la
# Comisión Europea (api.tech.ec.europa.eu/agrifood), sin autenticación.
#
# Cubre: cerdo blanco clase S (selecto), E (normal), R (graso) en €/kg canal.
# NO cubre: ibérico, cochinillos, lechones, desvieje — esos quedan vacíos.
#
# Se ejecuta cada lunes a las 07:00 UTC (después de que la CE publique
# los datos de la sesión de la semana anterior).
#
# También se puede disparar manualmente: Actions → Auto-actualización → Run workflow
# ─────────────────────────────────────────────────────────────────────────────

on:
  schedule:
    - cron: '0 7 * * 1'   # Lunes 07:00 UTC = 09:00 CEST
  workflow_dispatch:
    inputs:
      semanas:
        description: 'Número de semanas a importar (por defecto: 2)'
        required: false
        default: '2'

jobs:
  actualizar-precios:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Importar precios de la API CE
        run: |
          SEMANAS="${{ github.event.inputs.semanas || '2' }}"
          DIAS=$((SEMANAS * 7 + 7))  # +7 para solapamiento seguro
          DESDE=$(date -d "$DIAS days ago" +%Y-%m-%d)
          echo "Importando desde: $DESDE"
          node scripts/api-ue-importar.mjs --desde "$DESDE"

      - name: Commit y push si hay cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/content/sesiones/
          git diff --cached --quiet && echo "Sin cambios nuevos." && exit 0
          FECHA=$(date +%Y-%m-%d)
          git commit -m "datos: actualización automática API CE — $FECHA (blanco selecto/normal/graso)"
          git push
          echo ""
          echo "Precios actualizados. Vercel desplegará en ~1 minuto."
          echo "PENDIENTE rellenar manualmente: ibérico, cochinillos, lechones, desvieje."
          echo "Usa: Actions → Nueva sesión de precios → Run workflow"
